<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">
    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>QR.LOG</title>

    <link
        rel="stylesheet"
        href="style.css">

    <!-- ÍCONES -->

    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <!-- QR CODE -->

    <script
        src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js">
    </script>

    <!-- CÓDIGO DE BARRAS -->

    <script
        src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.6/dist/JsBarcode.all.min.js">
    </script>

    <!-- PNG -->

    <script
        src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js">
    </script>

</head>

<body>

    <!-- MENU -->

    <aside class="sidebar">

        <div class="logo">

            <h1>QR.LOG</h1>

            <span>
                Logística Inteligente
            </span>

        </div>

        <button onclick="abrirTela('home')">
            <i class="fa-solid fa-house"></i>
            Início
        </button>

        <button onclick="abrirTela('qrSimples')">
            <i class="fa-solid fa-qrcode"></i>
            QR Simples
        </button>

        <button onclick="abrirTela('colaborador')">
            <i class="fa-solid fa-user"></i>
            Colaboradores
        </button>

        <button onclick="abrirTela('codigoBarras')">
            <i class="fa-solid fa-barcode"></i>
            Código de Barras
        </button>

    </aside>

    <!-- CONTEÚDO -->

    <main class="content">

        <!-- HOME -->

        <section
            id="home"
            class="active">

            <div class="card">

                <h2>
                    Bem-vindo ao QR.LOG
                </h2>

                <p>
                    Sistema interno para geração
                    de QR Codes e etiquetas
                    logísticas.
                </p>

                <div class="atalhos">

                    <button
                        onclick="abrirTela('qrSimples')">

                        🔳 QR Simples

                    </button>

                    <button
                        onclick="abrirTela('colaborador')">

                        👤 Colaborador

                    </button>

                    <button
                        onclick="abrirTela('codigoBarras')">

                        📦 Código de Barras

                    </button>

                </div>

            </div>

        </section>


        <!-- QR SIMPLES -->

        <section id="qrSimples">

            <div class="card">

                <h2>
                    QR Code Simples
                </h2>

                <input
                    id="textoQR"
                    placeholder="Digite um texto ou link">

                <button
                    onclick="gerarQR()">

                    Gerar QR Code

                </button>

                <div id="qrcode"></div>

                <div class="acoes">

                    <button
                        onclick="salvarQRPNG()">

                        💾 PNG

                    </button>

                    <button
                        onclick="imprimirQR()">

                        🖨️ Imprimir

                    </button>

                </div>

            </div>

        </section>


        <!-- COLABORADOR -->

        <section id="colaborador">

            <div class="card">

                <h2>
                    QR Login Colaborador
                </h2>

                <input
                    id="nome"
                    placeholder="Nome">

                <input
                    id="loginUser"
                    placeholder="Login">

                <input
                    id="senha"
                    placeholder="Senha">

                <button
                    onclick="gerarCracha()">

                    Gerar Crachá

                </button>

                <div id="cardColaborador">

                    <h3 id="nomeCard"></h3>

                    <div class="blocoQR">

                        <span>
                            LOGIN
                        </span>

                        <div id="qrLogin"></div>

                    </div>

                    <div class="blocoQR">

                        <span>
                            SENHA
                        </span>

                        <div id="qrSenha"></div>

                    </div>

                </div>

                <div class="acoes">

                    <button
                        onclick="salvarCrachaPNG()">

                        💾 PNG

                    </button>

                    <button
                        onclick="imprimirCracha()">

                        🖨️ Imprimir

                    </button>

                    <button
                        onclick="limparCracha()">

                        🗑️ Limpar

                    </button>

                </div>

            </div>

        </section>


        <!-- CÓDIGO DE BARRAS -->

        <section id="codigoBarras">

            <div class="card">

                <h2>
                    Código de Barras
                </h2>

                <input
                    id="textoBarra"
                    placeholder="Digite o código">

                <button
                    onclick="gerarBarra()">

                    Gerar Código

                </button>

                <div
                    class="barcode-container">

                    <svg id="barcode"></svg>

                </div>

                <div class="acoes">

                    <button
                        onclick="salvarBarraPNG()">

                        💾 PNG

                    </button>

                    <button
                        onclick="imprimirCodigoBarras()">

                        🖨️ Imprimir

                    </button>

                    <button
                        onclick="limparBarra()">

                        🗑️ Limpar

                    </button>

                </div>

            </div>

        </section>

    </main>


    <!-- MODAL -->

    <div id="modalPrint">

        <div class="print-box">

            <h2>

                TIPO DE ETIQUETA

            </h2>

            <label>

                <input
                    type="radio"
                    name="print"
                    value="18x5"
                    checked>

                18 x 5 cm

            </label>

            <label>

                <input
                    type="radio"
                    name="print"
                    value="10x5">

                10 x 5 cm

            </label>

            <label>

                <input
                    type="radio"
                    name="print"
                    value="5x8">

                5 x 8 cm (Crachá)

            </label>

            <label>

                <input
                    type="radio"
                    name="print"
                    value="personalizado">

                Personalizado

            </label>

            <div class="btns-modal">

                <button
                    onclick="fecharImpressao()">

                    Cancelar

                </button>

                <button
                    onclick="window.print()">

                    Imprimir

                </button>

            </div>

        </div>

    </div>


    <!-- JS -->

    <script src="js/utils.js"></script>

    <script src="js/app.js"></script>

    <script src="js/qr.js"></script>

    <script src="js/barcode.js"></script>

    <script src="js/print.js"></script>

</body>

</html>
